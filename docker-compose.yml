version: "3.1"
services:
  mongo-db:
    image: mongo
    container_name: mongo-db
    ports: 
      - ${MONGO_DB_PORT}:${MONGO_DB_PORT}
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongo-db-data-store:/data/db
  sigedin-base:
    build: 
      context: .
      dockerfile: Dockerfile.base
    image: sigedin/base
    init: false
  rest-sgd:
    build: .
    image: sigedin/rest
    container_name: rest-sgd
    restart: unless-stopped
    links: 
      - mongo-db:mongo-db
    ports: 
      - ${PORT}:${PORT}
    depends_on: 
      - sigedin-base
      - mongo-db
volumes:
  mongo-db-data-store:
    driver: local