version: "3.1"
services:
  server-mongo:
    image: mongo
    container_name: mongo-db
    ports: 
      - ${MONGO_DB_PORT}:${MONGO_DB_PORT}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - monguito:/data/db
  server-mysql:
    image: mysql:5.7
    platform: linux/amd64
    container_name: mysql-db
    command: mysqld --sql_mode=""
    environment:
      MYSQL_ROOT_PASSWORD: ${SECRET_KEY}
      MYSQL_DATABASE: ${MYSQL_SGD_DATABASE}
      MYSQL_USER: ${MYSQL_SGD_USER}
      MYSQL_PASSWORD: ${MYSQL_SGD_PASS}
    ports:
      - 3306:3306
    volumes:
      - mysqlito:/var/lib/mysql:rw
  rest-sgd:
    build: .
    image: sigedin/rest
    container_name: rest-sgd
    restart: unless-stopped
    links:    
      - server-mongo:db-mongo
    ports: 
      - ${PORT}:${PORT}
    depends_on: 
      - server-mysql
      - server-mongo
volumes:
  mysqlito:
    driver: local
  monguito:
    driver: local